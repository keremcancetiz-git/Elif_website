

            <!-- Gallery -->
            <section class="gallery-section" style="margin-bottom:72px;">
                <div style="display:flex; align-items:center; gap:20px; margin-bottom:36px;">
                    <span class="label modal-section-label">Evidence & Documentation</span>
                    <div class="rule"></div>
                </div>
                <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px;">
                    ${p.gallery.map(item => `
                    <div style="background:var(--paper); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:box-shadow .25s;"
                        onmouseover="this.style.boxShadow='0 8px 24px rgba(0,0,0,0.07)'" onmouseout="this.style.boxShadow=''">
                        <div style="aspect-ratio:4/3; overflow:hidden; background:var(--cream);">
                            <img src="${item.url}" style="width:100%; height:100%; object-fit:cover; object-position:${item.pos || '50% 50%'}; cursor:zoom-in;"
                                onmouseenter="figureZoomEnter(this)"
                                onmousemove="figureZoomMove(event, this)"
                                onmouseleave="figureZoomLeave(this)">
                        </div>
                        <div style="padding:16px 20px;">
                            <h4 style="font-size:14px; font-weight:500; margin-bottom:4px; color:var(--ink);">${item.title}</h4>
                            <p style="font-size:12px; color:var(--muted); line-height:1.6; font-weight:300;">${item.desc}</p>
                        </div>
                    </div>`).join('')}
                </div>
            </section>
